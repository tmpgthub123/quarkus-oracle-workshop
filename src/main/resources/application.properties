#
# Quarkus demo configuration
# Keep these values easy to change in your terminal or IDE run configuration.
#

# HTTP / JSON layer
quarkus.http.port=8080

# gRPC demo (bonus, not replacing REST)
# gRPC runs on a dedicated port and uses generated classes from src/main/proto.
quarkus.grpc.server.port=9000
# gRPC client config for the small workshop demo REST wrapper endpoint.
quarkus.grpc.clients.book-service.host=localhost
quarkus.grpc.clients.book-service.port=9000

#
# Oracle datasource (Agroal handles pooling)
# The demo is aligned to Oracle Database Free on localhost:1521/FREEPDB1.
# Default credentials are the built-in SYSTEM account created by the image.
# Override these with env vars if needed:
# DB_USERNAME / DB_PASSWORD / DB_URL.
#
quarkus.datasource.db-kind=oracle
quarkus.datasource.jdbc.driver=oracle.jdbc.OracleDriver
quarkus.datasource.username=${DB_USERNAME:system}
quarkus.datasource.password=${DB_PASSWORD:demo_password}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/FREEPDB1}

# Keep pool small and explicit for local/dev learning environments.
quarkus.datasource.jdbc.initial-size=2
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=8

#
# Plain JDBC bootstrap scripts for the workshop database objects.
# Runs at startup (set demo.db-bootstrap.enabled=false to disable).
#
demo.db-bootstrap.enabled=${DB_BOOTSTRAP_ENABLED:true}
